# -----------------------------
# Server configuration
# -----------------------------
# Port du serveur : utilise le port fourni par l'environnement ou 8081 par défaut
server.port=${PORT:8081}

# -----------------------------
# Database configuration (Supabase IPv4)
# -----------------------------
# Remplace <YOUR-PASSWORD> par le mot de passe que tu as choisi dans Supabase
spring.datasource.url=jdbc:postgresql://<SESSION-POOLER-IPV4-HOST>:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=Noeantares.2003

# -----------------------------
# JPA / Hibernate
# -----------------------------
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update